name: picoCTF Stats
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  picoctf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate base metrics
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: "metrics.base.svg"
          token: "${{ secrets.METRICS_TOKEN || github.token }}"
          base: "activity, community, repositories, metadata"

      - name: Generate isocalendar metrics
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: "metrics.plugin.isocalendar.fullyear.clean.svg"
          token: "${{ secrets.METRICS_TOKEN || github.token }}"
          base: ""
          plugin_isocalendar: "yes"
          plugin_isocalendar_duration: "full-year"
          config_optimize: "yes"
          config_padding: "0, 8"
          extras_css: "h2 { display: none; }"

      - name: Generate language metrics
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: "metrics.plugin.languages.clean.svg"
          token: "${{ secrets.METRICS_TOKEN || github.token }}"
          base: ""
          plugin_languages: "yes"
          plugin_languages_ignored: "html, css"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_limit: "8"
          config_optimize: "yes"
          config_padding: "0, 8"
          extras_css: "h2 { display: none; }"

      - name: Generate LeetCode metrics
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: "metrics.plugin.leetcode.clean.svg"
          token: "${{ secrets.METRICS_TOKEN || github.token }}"
          base: ""
          plugin_leetcode: "yes"
          plugin_leetcode_user: "${{ vars.LEETCODE_USER || 'vOF31ss21z' }}"
          plugin_leetcode_sections: "solved, skills, recent"
          config_optimize: "yes"
          config_padding: "0, 8"
          extras_css: "h2 { display: none; }"

      - name: Generate star metrics
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: "metrics.plugin.stars.clean.svg"
          token: "${{ secrets.METRICS_TOKEN || github.token }}"
          base: ""
          plugin_stars: "yes"
          plugin_stars_limit: "4"
          config_optimize: "yes"
          config_padding: "0, 8"
          extras_css: "h2 { display: none; }"

      - name: Generate achievement metrics
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: "metrics.plugin.achievements.clean.svg"
          token: "${{ secrets.METRICS_TOKEN || github.token }}"
          base: ""
          plugin_achievements: "yes"
          plugin_achievements_display: "compact"
          plugin_achievements_threshold: "C"
          config_optimize: "yes"
          config_padding: "0, 8"
          extras_css: "h2 { display: none; }"

      - name: Generate lines metrics
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: "metrics.plugin.lines.svg"
          token: "${{ secrets.METRICS_TOKEN || github.token }}"
          base: ""
          plugin_lines: "yes"

      - name: Generate follow-up metrics
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: "metrics.plugin.followup.svg"
          token: "${{ secrets.METRICS_TOKEN || github.token }}"
          base: ""
          plugin_followup: "yes"
          plugin_followup_sections: "repositories"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install
        
      - name: Scrape picoCTF stats
        run: node picoctf-scraper.js
        
      - name: Generate README
        run: node generate-readme.js
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.svg README.md picoctf-stats.json
          git commit -m "chore: update metrics, picoCTF stats, and README [skip ci]" || echo "No changes to commit"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
